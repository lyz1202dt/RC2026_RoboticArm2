controller_manager:
  ros__parameters:
    update_rate: 500

    dog_controller:
      type: dog_controller/DogController

dog_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
      - effort
    joint1_kp: 50.0
    joint1_kd: 3.0
    joint2_kp: 50.0
    joint2_kd: 3.0
    joint3_kp: 50.0
    joint3_kd: 3.0
    joint4_kp: 50.0
    joint4_kd: 3.0
    joint5_kp: 50.0
    joint5_kd: 3.0
    joint6_kp: 50.0
    joint6_kd: 3.0
    joint_torque_filter_gate: 0.8
    joint_omega_filter_gate: 0.8
    command_effort_limit: 20.0
